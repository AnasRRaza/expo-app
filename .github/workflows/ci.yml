name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - run: yarn install --frozen-lockfile

      - run: yarn lint

      - run: yarn format:check

      - run: yarn typecheck

      - run: yarn test:ci
